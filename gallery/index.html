<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | St. Mark's School</title>
    <link rel="stylesheet" href="../css/site.css">
</head>
<body>
    <div id="header-container"></div>

    <main id="main-content" class="section gallery-page">
        <div class="container">
            <header class="gallery-header">
                <span class="pill">Gallery</span>
                <h1 class="section-title">Celebrating From Classrooms To Different Stages</p>
            </header>

            <section class="gallery-grid" aria-label="School gallery">
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Celabratingindiasheritage.jpg" alt="Celebrating India's Heritage" loading="lazy" data-full="../assets/Gallery/Celabratingindiasheritage.jpg">
                    <figcaption>Celebrating India's Heritage</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/CelebratingcultureandTradition.jpg" alt="Celebrating Culture and Tradition" loading="lazy" data-full="../assets/Gallery/CelebratingcultureandTradition.jpg">
                    <figcaption>Celebrating Culture and Tradition</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Celebratingstudentachievement.jpg" alt="Celebrating Student Achievement" loading="lazy" data-full="../assets/Gallery/Celebratingstudentachievement.jpg">
                    <figcaption>Celebrating Student Achievement</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Celebratingtalentsandimagination.jpg" alt="Celebrating Talents and Imagination" loading="lazy" data-full="../assets/Gallery/Celebratingtalentsandimagination.jpg">
                    <figcaption>Celebrating Talents and Imagination</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/ClassroomDemonstration.jpg" alt="Classroom Demonstration" loading="lazy" data-full="../assets/Gallery/ClassroomDemonstration.jpg">
                    <figcaption>Classroom Demonstration</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Culturalachievements.jpg" alt="Cultural Achievements" loading="lazy" data-full="../assets/Gallery/Culturalachievements.jpg">
                    <figcaption>Cultural Achievements</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Embracingrichculturalheritage.jpg" alt="Embracing Rich Cultural Heritage" loading="lazy" data-full="../assets/Gallery/Embracingrichculturalheritage.jpg">
                    <figcaption>Embracing Rich Cultural Heritage</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/EngagingYoungMindsCreativeLearning.jpg" alt="Engaging Young Minds in Creative Learning" loading="lazy" data-full="../assets/Gallery/EngagingYoungMindsCreativeLearning.jpg">
                    <figcaption>Engaging Young Minds in Creative Learning</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Naturethemewildlifeexploration.jpg" alt="Nature and Wildlife Exploration" loading="lazy" data-full="../assets/Gallery/Naturethemewildlifeexploration.jpg">
                    <figcaption>Nature and Wildlife Exploration</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Nurturingcreativityinclassroom.jpg" alt="Nurturing Creativity in the Classroom" loading="lazy" data-full="../assets/Gallery/Nurturingcreativityinclassroom.jpg">
                    <figcaption>Nurturing Creativity in the Classroom</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Traditionaldanceperformance1.jpg" alt="Traditional Dance Performance 1" loading="lazy" data-full="../assets/Gallery/Traditionaldanceperformance1.jpg">
                    <figcaption>Traditional Dance Performance 1</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Traditionaldanceperformance2.jpg" alt="Traditional Dance Performance 2" loading="lazy" data-full="../assets/Gallery/Traditionaldanceperformance2.jpg">
                    <figcaption>Traditional Dance Performance 2</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Traditionalmusic.jpg" alt="Traditional Music" loading="lazy" data-full="../assets/Gallery/Traditionalmusic.jpg">
                    <figcaption>Traditional Music</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/Unitydivisityinindia.jpg" alt="Unity in Diversity in India" loading="lazy" data-full="../assets/Gallery/Unitydivisityinindia.jpg">
                    <figcaption>Unity in Diversity in India</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/christmascelebration.jpg" alt="Christmas Celebration" loading="lazy" data-full="../assets/Gallery/christmascelebration.jpg">
                    <figcaption>Christmas Celebration</figcaption>
                </figure>
                <figure class="gallery-card">
                    <img src="../assets/Gallery/exploringcreativitythroughclayart.jpg" alt="Exploring Creativity Through Clay Art" loading="lazy" data-full="../assets/Gallery/exploringcreativitythroughclayart.jpg">
                    <figcaption>Exploring Creativity Through Clay Art</figcaption>
                </figure>
            </section>

            <div class="lightbox-backdrop" id="gallery-lightbox" hidden>
                <div class="lightbox-content">
                    <button class="lightbox-nav gallery-prev" aria-label="Previous image">‹</button>
                    <button class="lightbox-close" aria-label="Close">×</button>
                    <img src="" alt="" id="gallery-lightbox-img">
                    <button class="lightbox-nav gallery-next" aria-label="Next image">›</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="../js/site.js"></script>
</body>
</html>
